<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我喜欢你 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 36px;
            color: #ff5e8f;
            margin-bottom: 20px;
        }

        .heart {
            font-size: 80px;
            color: #ff477e;
            animation: beat 1s infinite alternate;
            margin: 20px 0;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        .text {
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yes {
            background: #ff477e;
            color: white;
        }

        #yes:hover {
            background: #ff2e63;
            transform: scale(1.05);
        }

        #no {
            background: #ccc;
            color: white;
        }

        /* 拒绝按钮会逃跑 */
        #no:hover {
            position: absolute;
            top: random() * 80vh;
            left: random() * 80vw;
        }

        /* 爱心飘落背景 */
        .bg-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="bg-hearts"></div>
    <div class="container">
        <h1>有句话想对你说</h1>
        <div class="heart">❤️</div>
        <div class="text">我喜欢你，愿意和我在一起吗？</div>
        <div class="btn-group">
            <button id="yes">我愿意 😊</button>
            <button id="no">不愿意 😢</button>
        </div>
    </div>

    <script>
        // 拒绝按钮逃跑
        const noBtn = document.getElementById('no');
        noBtn.addEventListener('mouseover', () => {
            noBtn.style.position = 'absolute';
            noBtn.style.top = Math.random() * 80 + 'vh';
            noBtn.style.left = Math.random() * 80 + 'vw';
        });

        // 同意按钮触发惊喜
        const yesBtn = document.getElementById('yes');
        yesBtn.addEventListener('click', () => {
            document.body.innerHTML = `
                <div style="text-align:center; margin-top:100px; color:white; font-size:30px;">
                    <h1>太棒啦！🥳</h1>
                    <p style="font-size:24px; margin:20px 0;">余生漫漫，我会一直爱你 ❤️</p>
                    <div style="font-size:100px;">💖💖💖</div>
                </div>
            `;
            document.body.style.background = 'linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%)';
        });

        // 爱心飘落动画
        function createHearts() {
            const bg = document.querySelector('.bg-hearts');
            for (let i = 0; i < 30; i++) {
                let heart = document.createElement('div');
                heart.innerText = '❤️';
                heart.style.position = 'absolute';
                heart.style.fontSize = Math.random() * 20 + 10 + 'px';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = -10 + 'px';
                heart.style.animation = `fall ${Math.random() * 5 + 5}s linear infinite`;
                bg.appendChild(heart);
            }
        }

        // 定义飘落动画
        let style = document.createElement('style');
        style.innerHTML = `
            @keyframes fall {
                0% { transform: translateY(0) rotate(0deg); opacity:1; }
                100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
            }
        `;
        document.head.appendChild(style);

        createHearts();
    </script>
</body>
</html>
